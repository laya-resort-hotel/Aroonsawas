<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan / Deduct</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { getSettings, getCardByCode, deductBalance, escapeHtml, formatMoney, getStatusClass, toDateTimeText, toDateValue, parseCardCode, isExpiredCard, loadScriptOnce } from './app.js';

  const ctx = await mountShell('scan-deduct.html','Scan / Deduct','หน้าหลักสำหรับ staff ใช้สแกน QR แล้วตัดยอดคงเหลือของบัตรจาก Firebase จริง พร้อมรองรับ iPhone / iPad มากขึ้น');
  const settings = await getSettings();
  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div class="split">
      <div class="card">
        <h3>Scan Card</h3>
        <div class="btn-row">
          <button class="btn secondary" id="startCamBtn" type="button">Start Camera</button>
          <button class="btn secondary" id="stopCamBtn" type="button">Stop Camera</button>
        </div>
        <div class="form-grid" style="margin-top:12px">
          <div class="field half">
            <label>Camera</label>
            <select id="cameraSelect"><option value="">Auto select camera</option></select>
          </div>
          <div class="field half">
            <label>Outlet</label>
            <select id="useOutlet">${(settings.outlets||[]).map(o=>`<option>${escapeHtml(o)}</option>`).join('')}</select>
          </div>
        </div>
        <div id="scannerRegion" class="scanner-wrap scanner-region" style="margin-top:12px"></div>
        <div class="helper" id="camMsg" style="margin-top:10px">Camera not started yet. ระบบจะลองใช้ built-in scanner ก่อน และยังรองรับ manual search เสมอ</div>
        <div class="small-note" style="margin-top:8px">บน iPhone / iPad ควรเปิดผ่าน HTTPS และกด Allow Camera เมื่อระบบถาม</div>
        <div class="form-grid" style="margin-top:12px">
          <div class="field">
            <label>Card Code / Label / Serial</label>
            <input id="manualCode" placeholder="Enter or scan card code">
          </div>
          <div class="field">
            <div class="btn-row">
              <button class="btn primary" type="button" id="findCardBtn">Find Card</button>
              <button class="btn secondary" type="button" id="clearScanBtn">Clear</button>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3>Deduct Balance</h3>
        <div id="cardPanel" class="helper">No card selected.</div>
        <form id="deductForm" class="form-grid" style="margin-top:14px">
          <div class="field half">
            <label>Amount to Deduct</label>
            <input id="deductAmount" type="number" min="1" step="1" placeholder="e.g. 100">
          </div>
          <div class="field half">
            <label>Bill Ref / Note</label>
            <input id="deductNote" placeholder="Optional note">
          </div>
          <div class="field">
            <div class="btn-row">
              <button class="btn primary" type="submit" id="deductSubmit">Deduct Now</button>
              <button class="btn secondary" type="button" id="scanNextBtn">Scan Next Card</button>
            </div>
          </div>
          <div class="field"><div id="deductFeedback" class="helper"></div></div>
        </form>
      </div>
    </div>`;

  const cardPanelEl = document.getElementById('cardPanel');
  const deductFeedbackEl = document.getElementById('deductFeedback');
  const manualCodeEl = document.getElementById('manualCode');
  const useOutletEl = document.getElementById('useOutlet');
  const deductAmountEl = document.getElementById('deductAmount');
  const deductNoteEl = document.getElementById('deductNote');
  const deductSubmitEl = document.getElementById('deductSubmit');
  const camMsgEl = document.getElementById('camMsg');
  const scannerRegionEl = document.getElementById('scannerRegion');
  const cameraSelectEl = document.getElementById('cameraSelect');

  let currentCard = null;
  let html5Qr = null;
  let scannerStarted = false;
  let lastDecoded = '';
  let lastDecodeAt = 0;
  let nativeStream = null;
  let nativeVideo = null;
  let nativeDetector = null;
  let nativeLoopTimer = null;

  function supportsNativeDetector() {
    return typeof window.BarcodeDetector !== 'undefined';
  }

  async function ensureDeviceLabels() {
    try {
      const temp = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      temp.getTracks().forEach(track => track.stop());
    } catch {}
  }

  async function enumerateVideoInputs() {
    if (!navigator.mediaDevices?.enumerateDevices) return [];
    const devices = await navigator.mediaDevices.enumerateDevices();
    return devices.filter(d => d.kind === 'videoinput').map((d, idx) => ({ id: d.deviceId, label: d.label || `Camera ${idx + 1}` }));
  }

  async function loadHtml5QrcodeLibrary() {
    if (window.Html5Qrcode) return;
    const sources = [
      'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js',
      'https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js'
    ];
    let lastErr = null;
    for (const src of sources) {
      try {
        await loadScriptOnce(src, () => !!window.Html5Qrcode);
        if (window.Html5Qrcode) return;
      } catch (err) {
        lastErr = err;
      }
    }
    throw lastErr || new Error('Unable to load QR scanner library.');
  }

  function updateDeductState(card) {
    deductSubmitEl.disabled = !(card && card.status === 'active' && !isExpiredCard(card));
  }

  function cameraLabelPriority(label = '') {
    const l = label.toLowerCase();
    if (/(back|rear|environment|wide)/.test(l)) return 3;
    if (/(front|user)/.test(l)) return 1;
    return 2;
  }

  async function populateCameraOptions() {
    try {
      await ensureDeviceLabels();
      let cameras = await enumerateVideoInputs();
      if ((!cameras || !cameras.length) && window.Html5Qrcode) {
        const html5Cams = await window.Html5Qrcode.getCameras();
        cameras = html5Cams.map(cam => ({ id: cam.id, label: cam.label || cam.id }));
      }
      const sorted = [...(cameras || [])].sort((a, b) => cameraLabelPriority(b.label) - cameraLabelPriority(a.label));
      cameraSelectEl.innerHTML = `<option value="">Auto select camera</option>${sorted.map(cam => `<option value="${escapeHtml(cam.id)}">${escapeHtml(cam.label || cam.id)}</option>`).join('')}`;
      return sorted;
    } catch (err) {
      camMsgEl.textContent = 'Cannot list cameras: ' + (err.message || 'Unknown error');
      return [];
    }
  }

  async function renderCard(card) {
    currentCard = card;
    if (!card) {
      cardPanelEl.innerHTML = 'Card not found.';
      updateDeductState(null);
      return;
    }
    const expired = isExpiredCard(card);
    cardPanelEl.innerHTML = `
      <div class="list-item">
        <div class="stat-line"><span>Card Code</span><strong>${escapeHtml(card.card_code)}</strong></div>
        <div class="stat-line"><span>Card Label</span><strong>${escapeHtml(card.card_label || '-')}</strong></div>
        <div class="stat-line"><span>Status</span><strong><span class="${getStatusClass(card.status)}">${escapeHtml(card.status)}${expired ? ' / expired' : ''}</span></strong></div>
        <div class="stat-line"><span>Remaining Balance</span><strong>${formatMoney(card.remaining_balance)}</strong></div>
        <div class="stat-line"><span>Valid Until</span><strong>${escapeHtml(toDateValue(card.valid_until) || 'Until empty')}</strong></div>
        <div class="stat-line"><span>Last Used</span><strong>${toDateTimeText(card.last_used_at)}</strong></div>
      </div>`;
    updateDeductState(card);
  }

  async function findCurrent() {
    deductFeedbackEl.textContent = '';
    const lookup = parseCardCode(manualCodeEl.value.trim());
    manualCodeEl.value = lookup;
    if (!lookup) {
      await renderCard(null);
      return;
    }
    currentCard = await getCardByCode(lookup);
    await renderCard(currentCard);
  }

  async function handleDecoded(rawText) {
    const value = parseCardCode(rawText || '');
    const now = Date.now();
    if (!value) return;
    if (value === lastDecoded && (now - lastDecodeAt) < 1800) return;
    lastDecoded = value;
    lastDecodeAt = now;
    manualCodeEl.value = value;
    await findCurrent();
    deductFeedbackEl.textContent = 'QR scanned successfully. ตรวจสอบบัตรแล้วค่อยกด Deduct.';
    await stopCamera();
  }

  async function stopCamera() {
    try {
      if (nativeLoopTimer) {
        clearTimeout(nativeLoopTimer);
        nativeLoopTimer = null;
      }
      if (nativeStream) {
        nativeStream.getTracks().forEach(track => track.stop());
      }
      if (html5Qr && scannerStarted) {
        await html5Qr.stop();
        await html5Qr.clear();
      }
    } catch {}
    html5Qr = null;
    nativeStream = null;
    nativeVideo = null;
    nativeDetector = null;
    scannerStarted = false;
    scannerRegionEl.innerHTML = '';
    camMsgEl.textContent = 'Camera stopped.';
  }

  async function startNativeCamera() {
    const selected = cameraSelectEl.value;
    const constraints = selected
      ? { video: { deviceId: { exact: selected } }, audio: false }
      : { video: { facingMode: { ideal: 'environment' } }, audio: false };
    nativeStream = await navigator.mediaDevices.getUserMedia(constraints);
    nativeVideo = document.createElement('video');
    nativeVideo.setAttribute('playsinline', 'true');
    nativeVideo.muted = true;
    nativeVideo.autoplay = true;
    nativeVideo.style.width = '100%';
    nativeVideo.style.maxWidth = '420px';
    nativeVideo.style.borderRadius = '16px';
    nativeVideo.style.display = 'block';
    nativeVideo.srcObject = nativeStream;
    scannerRegionEl.innerHTML = '';
    scannerRegionEl.appendChild(nativeVideo);
    await nativeVideo.play();
    nativeDetector = new window.BarcodeDetector({ formats: ['qr_code'] });
    scannerStarted = true;
    camMsgEl.textContent = 'Camera started. ใช้ built-in scanner ของเครื่อง';

    const tick = async () => {
      if (!scannerStarted || !nativeVideo || nativeVideo.readyState < 2) {
        nativeLoopTimer = setTimeout(tick, 250);
        return;
      }
      try {
        const codes = await nativeDetector.detect(nativeVideo);
        if (codes && codes.length) {
          const raw = codes[0].rawValue || codes[0].rawData || '';
          if (raw) {
            await handleDecoded(raw);
            return;
          }
        }
      } catch {}
      nativeLoopTimer = setTimeout(tick, 180);
    };
    tick();
  }

  async function startFallbackCamera() {
    await loadHtml5QrcodeLibrary();
    const cameras = await populateCameraOptions();
    const selected = cameraSelectEl.value;
    const preferred = selected || cameras[0]?.id;
    if (!preferred) throw new Error('No camera found on this device.');
    html5Qr = new window.Html5Qrcode('scannerRegion');
    await html5Qr.start(
      preferred,
      {
        fps: 10,
        qrbox: { width: 220, height: 220 },
        aspectRatio: 1.333334,
        rememberLastUsedCamera: true,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      },
      async (decodedText) => { await handleDecoded(decodedText); },
      () => {}
    );
    scannerStarted = true;
    camMsgEl.textContent = 'Camera started. พร้อมสแกน QR';
  }

  async function startCamera() {
    await stopCamera();
    if (!window.isSecureContext) {
      camMsgEl.textContent = 'Camera requires HTTPS or localhost.';
      return;
    }
    try {
      const cameras = await populateCameraOptions();
      if (!cameraSelectEl.value && cameras[0]?.id) cameraSelectEl.value = cameras[0].id;
      if (supportsNativeDetector()) {
        await startNativeCamera();
        return;
      }
      await startFallbackCamera();
    } catch (err) {
      camMsgEl.textContent = 'เปิดกล้องไม่สำเร็จ: ' + (err.message || 'Unknown error');
    }
  }

  document.getElementById('findCardBtn').onclick = findCurrent;
  document.getElementById('clearScanBtn').onclick = async () => {
    manualCodeEl.value = '';
    deductAmountEl.value = '';
    deductNoteEl.value = '';
    deductFeedbackEl.textContent = '';
    lastDecoded = '';
    await renderCard(null);
  };
  document.getElementById('scanNextBtn').onclick = async () => {
    manualCodeEl.value = '';
    deductAmountEl.value = '';
    deductNoteEl.value = '';
    deductFeedbackEl.textContent = '';
    lastDecoded = '';
    await renderCard(null);
    await startCamera();
  };
  manualCodeEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      await findCurrent();
    }
  });
  document.getElementById('startCamBtn').onclick = startCamera;
  document.getElementById('stopCamBtn').onclick = stopCamera;
  cameraSelectEl.onchange = async () => { if (scannerStarted) await startCamera(); };
  updateDeductState(null);
  await populateCameraOptions();

  document.getElementById('deductForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    deductFeedbackEl.textContent = 'Processing Firebase transaction...';
    try {
      if (!currentCard) throw new Error('Find a card first.');
      if (currentCard.status !== 'active') throw new Error('This card is not active.');
      if (isExpiredCard(currentCard)) throw new Error('This card has expired.');
      const result = await deductBalance(currentCard.id, deductAmountEl.value, useOutletEl.value, deductNoteEl.value.trim(), ctx);
      deductFeedbackEl.textContent = `Deducted ${formatMoney(result.amount)} successfully. Remaining ${formatMoney(result.after)}.`;
      currentCard = result.card;
      await renderCard(result.card);
      deductAmountEl.value = '';
      deductNoteEl.value = '';
    } catch (err) {
      deductFeedbackEl.textContent = err.message || 'Deduct failed';
    }
  });

  window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
