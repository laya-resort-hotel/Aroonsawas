<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { dashboardData, formatMoney, escapeHtml, toDateTimeText, toDateValue, todayBusinessDate, exportSheetsXlsx, exportPdfReport } from './app.js';
  await mountShell('dashboard.html','Dashboard','ยอดขายและยอดใช้ของ Sales Voucher v6 เท่านั้น ไม่ปนกับ Free Voucher เดิม');
  const el = document.getElementById('pageContent');
  const today = todayBusinessDate();
  let lastData = null;
  el.innerHTML = `
    <div class="card">
      <div class="form-grid">
        <div class="field third"><label>From Date</label><input id="fromDate" type="date" value="${today}"></div>
        <div class="field third"><label>To Date</label><input id="toDate" type="date" value="${today}"></div>
        <div class="field third"><label>Outlet</label><input id="outlet" placeholder="All outlets"></div>
      </div>
      <div class="btn-row" style="margin-top:12px">
        <button id="applyBtn" class="btn primary" type="button">Apply Filter</button>
        <button id="resetBtn" class="btn secondary" type="button">Today</button>
        <button id="xlsxBtn" class="btn secondary" type="button">Export XLSX</button>
        <button id="pdfBtn" class="btn secondary" type="button">Export PDF</button>
      </div>
    </div>
    <div id="dashBox" class="notice" style="margin-top:16px">กำลังโหลดข้อมูล...</div>`;

  const fromDateEl = document.getElementById('fromDate');
  const toDateEl = document.getElementById('toDate');
  const outletEl = document.getElementById('outlet');
  const dashBoxEl = document.getElementById('dashBox');

  function currentRangeText() {
    return `${fromDateEl.value || today} to ${toDateEl.value || today}${outletEl.value.trim() ? ` · Outlet: ${outletEl.value.trim()}` : ''}`;
  }

  async function render() {
    dashBoxEl.innerHTML = 'กำลังโหลดข้อมูล...';
    try {
      const data = await dashboardData({ fromDate: fromDateEl.value, toDate: toDateEl.value, outlet: outletEl.value.trim() });
      lastData = data;
      const { stats, byOutlet, byStaff, recentTransactions, lowBalanceCards, nearExpiryCards, recentlyEmptied, trendDays, range } = data;
      const maxBar = Math.max(1, ...trendDays.flatMap(d => [d.sales, d.debit]));
      dashBoxEl.innerHTML = `
      <div class="helper" style="margin-bottom:12px">ช่วงข้อมูล: <strong>${escapeHtml(range.fromDate)}</strong> ถึง <strong>${escapeHtml(range.toDate)}</strong>${outletEl.value.trim() ? ` · Outlet: <strong>${escapeHtml(outletEl.value.trim())}</strong>` : ''}</div>
      <div class="kpi-grid">
        <div class="card kpi"><div class="metric"><div class="label">Sales</div><div class="value">${formatMoney(stats.salesToday)}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Cards Sold</div><div class="value">${stats.cardsSoldToday}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Redeemed</div><div class="value">${formatMoney(stats.redeemedToday)}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Outstanding</div><div class="value">${formatMoney(stats.outstanding)}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Active Cards</div><div class="value">${stats.activeCards}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Empty Cards</div><div class="value">${stats.emptyCards}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Draft Cards</div><div class="value">${stats.draftCards}</div></div></div>
        <div class="card kpi"><div class="metric"><div class="label">Disabled Cards</div><div class="value">${stats.disabledCards}</div></div></div>
      </div>
      <div class="split">
        <div class="card"><h3>7-Day Sales Trend</h3><div class="chart-box">${trendDays.map(d => `<div class="chart-bar" style="height:${Math.max(22, (d.sales/maxBar)*180)}px"><strong>${d.sales ? Math.round(d.sales) : ''}</strong><span>${d.label}</span></div>`).join('')}</div></div>
        <div class="card"><h3>7-Day Redeemed Trend</h3><div class="chart-box">${trendDays.map(d => `<div class="chart-bar" style="height:${Math.max(22, (d.debit/maxBar)*180)}px;background:linear-gradient(180deg,#7db8ff,#4573d6)"><strong>${d.debit ? Math.round(d.debit) : ''}</strong><span>${d.label}</span></div>`).join('')}</div></div>
      </div>
      <div class="split" style="margin-top:16px">
        <div class="card"><h3>Debit by Outlet</h3><div class="list">${(byOutlet.length?byOutlet:[{label:'No data',value:0}]).map(r => `<div class="list-item"><div class="stat-line"><span>${escapeHtml(r.label)}</span><strong>${formatMoney(r.value)}</strong></div></div>`).join('')}</div></div>
        <div class="card"><h3>Debit by Staff</h3><div class="list">${(byStaff.length?byStaff:[{label:'No data',value:0}]).map(r => `<div class="list-item"><div class="stat-line"><span>${escapeHtml(r.label)}</span><strong>${formatMoney(r.value)}</strong></div></div>`).join('')}</div></div>
      </div>
      <div class="card" style="margin-top:16px"><h3>Recent Transactions</h3><div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Card</th><th>Amount</th><th>After</th><th>Outlet</th><th>Staff</th></tr></thead><tbody>${recentTransactions.length ? recentTransactions.map(t => `<tr><td>${toDateTimeText(t.created_at)}</td><td>${escapeHtml(t.txn_type)}</td><td><a href="card-detail.html?id=${encodeURIComponent(t.card_id)}">${escapeHtml(t.card_code)}</a></td><td>${formatMoney(t.amount)}</td><td>${formatMoney(t.balance_after)}</td><td>${escapeHtml(t.outlet||'-')}</td><td>${escapeHtml(t.staff_name||'-')}</td></tr>`).join('') : '<tr><td colspan="7">No transactions found in this range.</td></tr>'}</tbody></table></div></div>
      <div class="split" style="margin-top:16px">
        <div class="card"><h3>Low Balance Cards</h3><div class="list">${lowBalanceCards.length ? lowBalanceCards.map(c => `<a class="list-item" href="card-detail.html?id=${c.id}"><div class="stat-line"><span>${escapeHtml(c.card_label)} <small>${escapeHtml(c.card_code)}</small></span><strong>${formatMoney(c.remaining_balance)}</strong></div></a>`).join('') : '<div class="helper">No low-balance cards.</div>'}</div></div>
        <div class="card"><h3>Cards Near Expiry</h3><div class="list">${nearExpiryCards.length ? nearExpiryCards.map(c => `<a class="list-item" href="card-detail.html?id=${c.id}"><div class="stat-line"><span>${escapeHtml(c.card_label)}</span><strong>${escapeHtml(toDateValue(c.valid_until) || '-')}</strong></div></a>`).join('') : '<div class="helper">No expiry dates found.</div>'}</div></div>
      </div>
      <div class="card" style="margin-top:16px"><h3>Recently Emptied Cards</h3><div class="list">${recentlyEmptied.length ? recentlyEmptied.map(c => `<a class="list-item" href="card-detail.html?id=${c.id}"><div class="stat-line"><span>${escapeHtml(c.card_label)} / ${escapeHtml(c.card_code)}</span><strong>${toDateTimeText(c.last_used_at)}</strong></div></a>`).join('') : '<div class="helper">No empty cards yet.</div>'}</div></div>`;
    } catch (err) {
      lastData = null;
      dashBoxEl.innerHTML = `<div class="card"><h3>Dashboard load failed</h3><div class="helper">${escapeHtml(err.message || 'Unknown error')}</div><div class="helper" style="margin-top:8px">ตรวจ Firestore Rules และ collection sale_cards / sale_card_transactions / sale_settings</div></div>`;
    }
  }

  async function exportDashboardXlsx() {
    if (!lastData) return alert('Load dashboard data first.');
    const { stats, byOutlet, byStaff, recentTransactions, lowBalanceCards, nearExpiryCards, recentlyEmptied, trendDays } = lastData;
    await exportSheetsXlsx(`sales-voucher-dashboard-${todayBusinessDate()}.xlsx`, [
      { name: 'Summary', rows: [
        { Metric: 'Range', Value: currentRangeText() },
        { Metric: 'Sales', Value: stats.salesToday },
        { Metric: 'Cards Sold', Value: stats.cardsSoldToday },
        { Metric: 'Redeemed', Value: stats.redeemedToday },
        { Metric: 'Outstanding', Value: stats.outstanding },
        { Metric: 'Active Cards', Value: stats.activeCards },
        { Metric: 'Empty Cards', Value: stats.emptyCards },
        { Metric: 'Draft Cards', Value: stats.draftCards },
        { Metric: 'Disabled Cards', Value: stats.disabledCards }
      ]},
      { name: 'Trend', rows: trendDays.map(r => ({ Date: r.key, Label: r.label, Sales: r.sales, Redeemed: r.debit })) },
      { name: 'By Outlet', rows: byOutlet.map(r => ({ Outlet: r.label, Redeemed: r.value })) },
      { name: 'By Staff', rows: byStaff.map(r => ({ Staff: r.label, Redeemed: r.value })) },
      { name: 'Recent Txns', rows: recentTransactions.map(t => ({ Date: toDateTimeText(t.created_at), Type: t.txn_type, Card: t.card_code, Amount: t.amount, After: t.balance_after, Outlet: t.outlet, Staff: t.staff_name })) },
      { name: 'Low Balance', rows: lowBalanceCards.map(c => ({ Card: c.card_code, Label: c.card_label, Remaining: c.remaining_balance, Status: c.status })) },
      { name: 'Near Expiry', rows: nearExpiryCards.map(c => ({ Card: c.card_code, Label: c.card_label, ValidUntil: toDateValue(c.valid_until) || '' })) },
      { name: 'Recently Empty', rows: recentlyEmptied.map(c => ({ Card: c.card_code, Label: c.card_label, LastUsed: toDateTimeText(c.last_used_at) })) }
    ]);
  }

  async function exportDashboardPdf() {
    if (!lastData) return alert('Load dashboard data first.');
    const { stats, byOutlet, byStaff, recentTransactions } = lastData;
    await exportPdfReport({
      fileName: `sales-voucher-dashboard-${todayBusinessDate()}.pdf`,
      title: 'Laya Sales Voucher v6 Dashboard',
      subtitle: currentRangeText(),
      summaryRows: [
        ['Sales', formatMoney(stats.salesToday)],
        ['Cards Sold', stats.cardsSoldToday],
        ['Redeemed', formatMoney(stats.redeemedToday)],
        ['Outstanding', formatMoney(stats.outstanding)],
        ['Active Cards', stats.activeCards],
        ['Empty Cards', stats.emptyCards],
        ['Draft Cards', stats.draftCards],
        ['Disabled Cards', stats.disabledCards]
      ],
      tables: [
        { title: 'Redeemed by Outlet', head: ['Outlet', 'Redeemed'], body: (byOutlet.length ? byOutlet : [{ label: 'No data', value: 0 }]).map(r => [r.label, formatMoney(r.value)]) },
        { title: 'Redeemed by Staff', head: ['Staff', 'Redeemed'], body: (byStaff.length ? byStaff : [{ label: 'No data', value: 0 }]).map(r => [r.label, formatMoney(r.value)]) },
        { title: 'Recent Transactions', head: ['Date', 'Type', 'Card', 'Amount', 'After', 'Outlet', 'Staff'], body: recentTransactions.map(t => [toDateTimeText(t.created_at), t.txn_type, t.card_code, formatMoney(t.amount), formatMoney(t.balance_after), t.outlet || '-', t.staff_name || '-']) }
      ]
    });
  }

  document.getElementById('applyBtn').addEventListener('click', render);
  document.getElementById('resetBtn').addEventListener('click', () => { fromDateEl.value = today; toDateEl.value = today; outletEl.value = ''; render(); });
  document.getElementById('xlsxBtn').addEventListener('click', exportDashboardXlsx);
  document.getElementById('pdfBtn').addEventListener('click', exportDashboardPdf);
  await render();
</script>
</body>
</html>
