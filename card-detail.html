<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Card Detail</title><link rel="stylesheet" href="style.css" /></head>
<body><div id="app"></div>
<script type="module">
  import { mountShell, roleCan } from './auth-guard.js';
  import { getCardById, getCardTransactions, updateCardStatus, adjustBalance, voidDebitTransaction, escapeHtml, formatMoney, getStatusClass, toDateTimeText, toDateValue } from './app.js';
  const ctx = await mountShell('card-detail.html','Card Detail','สรุปข้อมูลบัตร 1 ใบ โดย FB Staff ดูได้แบบอ่านอย่างเดียว');
  const id = new URLSearchParams(location.search).get('id');
  const el = document.getElementById('pageContent');

  async function render() {
    const card = await getCardById(id);
    if (!card) {
      el.innerHTML = '<div class="card">Card not found.</div>';
      return;
    }
    const txns = await getCardTransactions(card.id);
    const lastVoidable = txns.find(t => t.txn_type === 'debit' && !t.voided);
    el.innerHTML = `
      <div class="split">
        <div class="card">
          <h3>Card Summary</h3>
          <div class="list-item">
            <div class="stat-line"><span>Card Code</span><strong>${escapeHtml(card.card_code)}</strong></div>
            <div class="stat-line"><span>Card Label</span><strong>${escapeHtml(card.card_label || '-')}</strong></div>
            <div class="stat-line"><span>Serial</span><strong>${escapeHtml(card.card_serial || '-')}</strong></div>
            <div class="stat-line"><span>Status</span><strong><span class="${getStatusClass(card.status)}">${card.status}</span></strong></div>
            <div class="stat-line"><span>Face Value</span><strong>${formatMoney(card.face_value)}</strong></div>
            <div class="stat-line"><span>Sold Price</span><strong>${formatMoney(card.sold_price)}</strong></div>
            <div class="stat-line"><span>Remaining Balance</span><strong>${formatMoney(card.remaining_balance)}</strong></div>
            <div class="stat-line"><span>Outlet Scope</span><strong>${escapeHtml(card.outlet_scope || '-')}</strong></div>
            <div class="stat-line"><span>Valid Until</span><strong>${escapeHtml(toDateValue(card.valid_until) || 'Until empty')}</strong></div>
            <div class="stat-line"><span>Sold At</span><strong>${toDateTimeText(card.sold_at)}</strong></div>
            <div class="stat-line"><span>Last Used</span><strong>${toDateTimeText(card.last_used_at)}</strong></div>
          </div>
          <div class="btn-row" style="margin-top:12px">
            ${roleCan(ctx.profile.role, 'sell') && card.status !== 'disabled' ? `<button class="btn danger" id="disableBtn" type="button">Disable</button>` : ''}
            ${roleCan(ctx.profile.role, 'sell') && card.status === 'disabled' ? `<button class="btn primary" id="enableBtn" type="button">Enable</button>` : ''}
            ${roleCan(ctx.profile.role, 'sell') ? `<button class="btn secondary" id="adjustPlusBtn" type="button">Adjustment +</button><button class="btn secondary" id="adjustMinusBtn" type="button">Adjustment -</button>` : ''}
            ${roleCan(ctx.profile.role, 'print') ? `<a class=\"btn secondary\" href=\"print-card-template.html?id=${encodeURIComponent(card.id)}\" target=\"_blank\" rel=\"noopener noreferrer\">Print Card</a>` : ''}${roleCan(ctx.profile.role, 'transactions') && lastVoidable ? `<button class="btn secondary" id="voidLastDebitBtn" type="button">Void Last Debit</button>` : ''}
          </div>
          <div id="actionFeedback" class="helper" style="margin-top:10px"></div>
        </div>
        <div class="card">
          <h3>Transaction History</h3>
          <div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Before</th><th>After</th><th>Outlet</th><th>Staff</th><th>Note</th></tr></thead><tbody>${txns.length ? txns.map(t => `<tr><td>${toDateTimeText(t.created_at)}</td><td>${escapeHtml(t.txn_type)}${t.voided ? ' <span class="helper">(voided)</span>' : ''}</td><td>${formatMoney(t.amount)}</td><td>${formatMoney(t.balance_before)}</td><td>${formatMoney(t.balance_after)}</td><td>${escapeHtml(t.outlet || '-')}</td><td>${escapeHtml(t.staff_name || '-')}</td><td>${escapeHtml(t.note || '-')}</td></tr>`).join('') : '<tr><td colspan="8">No transactions yet.</td></tr>'}</tbody></table></div>
        </div>
      </div>`;

    const actionFeedbackEl = document.getElementById('actionFeedback');
    document.getElementById('disableBtn')?.addEventListener('click', async () => {
      try { await updateCardStatus(card.id, 'disabled', ctx, 'Card disabled from detail page'); actionFeedbackEl.textContent = 'Card disabled.'; await render(); } catch (err) { actionFeedbackEl.textContent = err.message || 'Action failed'; }
    });
    document.getElementById('enableBtn')?.addEventListener('click', async () => {
      try { await updateCardStatus(card.id, 'active', ctx, 'Card enabled from detail page'); actionFeedbackEl.textContent = 'Card enabled.'; await render(); } catch (err) { actionFeedbackEl.textContent = err.message || 'Action failed'; }
    });
    document.getElementById('adjustPlusBtn')?.addEventListener('click', async () => {
      const raw = prompt('Increase balance by amount (THB)', '100');
      if (raw == null) return;
      const note = prompt('Reason / note', 'Manual top-up adjustment') || 'Manual top-up adjustment';
      try { await adjustBalance(card.id, Math.abs(Number(raw)), note, ctx); actionFeedbackEl.textContent = 'Balance increased.'; await render(); } catch (err) { actionFeedbackEl.textContent = err.message || 'Adjustment failed'; }
    });
    document.getElementById('adjustMinusBtn')?.addEventListener('click', async () => {
      const raw = prompt('Decrease balance by amount (THB)', '100');
      if (raw == null) return;
      const note = prompt('Reason / note', 'Manual debit adjustment') || 'Manual debit adjustment';
      try { await adjustBalance(card.id, -Math.abs(Number(raw)), note, ctx); actionFeedbackEl.textContent = 'Balance decreased.'; await render(); } catch (err) { actionFeedbackEl.textContent = err.message || 'Adjustment failed'; }
    });
    document.getElementById('voidLastDebitBtn')?.addEventListener('click', async () => {
      if (!lastVoidable) return;
      const note = prompt('Reason for void last debit', `Void last debit ${lastVoidable.id}`) || `Void last debit ${lastVoidable.id}`;
      try { await voidDebitTransaction(lastVoidable.id, ctx, note); actionFeedbackEl.textContent = 'Last debit voided.'; await render(); } catch (err) { actionFeedbackEl.textContent = err.message || 'Void failed'; }
    });
  }

  await render();
</script>
</body></html>
