<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Voucher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { getCardById, getCardByCode, ensureQrCodeLib, escapeHtml, formatMoney } from './app.js';

  const ctx = await mountShell('print-card-template.html','Print Voucher','พรีวิวบัตร Aroonsawat แบบหน้าหลังตามแพทเทิร์นจริง พร้อมพิมพ์หรือ Save as PDF');
  if (!ctx) throw new Error('auth required');

  const el = document.getElementById('pageContent');
  el.innerHTML = `<div id="printToolbar" class="card no-print"><div class="btn-row"><button class="btn primary" id="printBtn" type="button">Print Voucher / Save PDF</button><a class="btn secondary" id="detailBtn" href="search-card.html">Back to Search</a></div><div id="printFeedback" class="helper" style="margin-top:8px">Loading voucher...</div></div><div id="printStage"></div>`;

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const code = params.get('code');
  const printStageEl = document.getElementById('printStage');
  const printFeedbackEl = document.getElementById('printFeedback');
  const detailBtnEl = document.getElementById('detailBtn');

  function getVoucherSoldPrice(card) {
    const soldPrice = Number(card?.sold_price || 0);
    if (soldPrice > 0) return soldPrice;
    const parsedCode = String(card?.card_code || '').match(/(\d{3,4})/);
    if (parsedCode) return Number(parsedCode[1]);
    return Number(card?.face_value || 500) || 500;
  }

  async function render() {
    try {
      const card = id ? await getCardById(id) : await getCardByCode(code || '');
      if (!card) throw new Error('Card not found.');
      detailBtnEl.href = `card-detail.html?id=${encodeURIComponent(card.id)}`;

      const soldPrice = getVoucherSoldPrice(card);
      const soldPriceText = escapeHtml(formatMoney(soldPrice));
      const frontImage = 'assets/print-voucher/aroonsawat-front-500.png';
      const backImage = 'assets/print-voucher/aroonsawat-back-500.png';

      printStageEl.innerHTML = `
        <div class="voucher-print-stage">
          <div class="voucher-print-grid">
            <section class="voucher-panel">
              <div class="voucher-side-label no-print">Front</div>
              <div class="voucher-image-card voucher-image-card-front">
                <img src="${frontImage}" alt="Aroonsawat voucher front" />
                <div class="voucher-front-chip">
                  <strong>${soldPriceText}</strong>
                  <span>Voucher</span>
                </div>
              </div>
            </section>

            <section class="voucher-panel">
              <div class="voucher-side-label no-print">Back</div>
              <div class="voucher-image-card voucher-image-card-back">
                <img src="${backImage}" alt="Aroonsawat voucher back" />
                <div class="voucher-qr-overlay">
                  <div id="qrBack" class="voucher-qr-code"></div>
                </div>
              </div>
            </section>
          </div>
        </div>`;

      await ensureQrCodeLib();
      new window.QRCode(document.getElementById('qrBack'), {
        text: card.card_code || '',
        width: 132,
        height: 132,
        correctLevel: window.QRCode.CorrectLevel.H
      });

      printFeedbackEl.textContent = `Ready to print ${card.card_code || 'voucher'} in Aroonsawat front/back style.`;
    } catch (err) {
      printStageEl.innerHTML = `<div class="card"><h3>Print voucher load failed</h3><div class="helper">${escapeHtml(err.message || 'Unknown error')}</div></div>`;
      printFeedbackEl.textContent = 'Load failed';
    }
  }

  document.getElementById('printBtn').addEventListener('click', () => window.print());
  await render();
</script>
</body>
</html>
