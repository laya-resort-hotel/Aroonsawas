<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Card Template</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { getCardById, getCardByCode, ensureQrCodeLib, escapeHtml, formatMoney, toDateValue } from './app.js';
  const ctx = await mountShell('print-card-template.html','Print Card Template','พรีวิวการ์ดจริง front/back และพร้อมพิมพ์หรือ Save as PDF');
  if (!ctx) throw new Error('auth required');
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div id="printToolbar" class="card no-print"><div class="btn-row"><button class="btn primary" id="printBtn" type="button">Print / Save PDF</button><a class="btn secondary" id="detailBtn" href="search-card.html">Back to Search</a></div><div id="printFeedback" class="helper" style="margin-top:8px">Loading card...</div></div><div id="printStage"></div>`;

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const code = params.get('code');
  const printStageEl = document.getElementById('printStage');
  const printFeedbackEl = document.getElementById('printFeedback');
  const detailBtnEl = document.getElementById('detailBtn');

  async function render() {
    try {
      const card = id ? await getCardById(id) : await getCardByCode(code || '');
      if (!card) throw new Error('Card not found.');
      detailBtnEl.href = `card-detail.html?id=${encodeURIComponent(card.id)}`;
      await ensureQrCodeLib();
      printStageEl.innerHTML = `
        <div class="print-card-stage">
          <div class="sale-card-mockup">
            <div class="sale-card-front">
              <div class="sale-card-border"></div>
              <div class="sale-card-header">
                <div>
                  <div class="sale-card-brand">LAYA RESORT HOTEL</div>
                  <div class="sale-card-subtitle">Sales Voucher</div>
                </div>
                <div class="sale-card-value">${escapeHtml((card.currency || 'THB'))} ${escapeHtml(String(card.face_value || 0))}</div>
              </div>
              <div class="sale-card-body">
                <div class="sale-card-qr-wrap"><div id="qrFront" class="sale-card-qr"></div></div>
                <div class="sale-card-front-meta">
                  <div class="sale-card-line"><span>Card Code</span><strong>${escapeHtml(card.card_code || '-')}</strong></div>
                  <div class="sale-card-line"><span>Card Label</span><strong>${escapeHtml(card.card_label || '-')}</strong></div>
                  <div class="sale-card-line"><span>Outlet</span><strong>${escapeHtml(card.outlet_scope || 'Aroonsawat')}</strong></div>
                  <div class="sale-card-line"><span>Valid Until</span><strong>${escapeHtml(toDateValue(card.valid_until) || 'Until fully redeemed')}</strong></div>
                </div>
              </div>
              <div class="sale-card-footer">Redeemable only at ${escapeHtml(card.outlet_scope || 'Aroonsawat')}</div>
            </div>
            <div class="sale-card-back">
              <div class="sale-card-border"></div>
              <div class="sale-card-back-title">Voucher Policy</div>
              <div class="sale-card-policy"><strong>Valid Until:</strong> ${escapeHtml(toDateValue(card.valid_until) || 'Until fully redeemed')}</div>
              <div class="sale-card-policy"><strong>Issued By:</strong> LAYA RESORT HOTEL</div>
              <div class="sale-card-terms-title">Terms &amp; Conditions</div>
              <ul class="sale-card-terms">
                <li>Redeemable only at ${escapeHtml(card.outlet_scope || 'Aroonsawat')}.</li>
                <li>Please present the QR code and card code to staff before ordering.</li>
                <li>This card is valid only for eligible menu purchases under hotel policy.</li>
                <li>It cannot be combined with promotions, discounts, or other special offers.</li>
                <li>This card is non-refundable, non-transferable, and has no cash value.</li>
                <li>Management reserves the right to amend these terms without prior notice.</li>
              </ul>
              <div class="sale-card-serial">Serial: ${escapeHtml(card.card_serial || card.card_code || '-')}</div>
            </div>
          </div>
        </div>`;
      new window.QRCode(document.getElementById('qrFront'), {
        text: card.card_code || '',
        width: 148,
        height: 148,
        correctLevel: window.QRCode.CorrectLevel.H
      });
      printFeedbackEl.textContent = `Ready to print ${card.card_code}.`;
    } catch (err) {
      printStageEl.innerHTML = `<div class="card"><h3>Print template load failed</h3><div class="helper">${escapeHtml(err.message || 'Unknown error')}</div></div>`;
      printFeedbackEl.textContent = 'Load failed';
    }
  }

  document.getElementById('printBtn').addEventListener('click', () => window.print());
  await render();
</script>
</body>
</html>
