<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print QR</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .qr-print-toolbar{padding:18px 22px;margin-bottom:20px}
    .qr-print-toolbar .btn-row{display:flex;gap:12px;flex-wrap:wrap}
    .qr-print-stage{display:flex;justify-content:center}
    .qr-only-shell{display:flex;justify-content:center;align-items:center;width:100%}
    .qr-only-card{
      min-width:320px;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      border-radius:24px;
      background:#fff;
      box-shadow:0 18px 40px rgba(0,0,0,.12);
      border:1px solid rgba(0,0,0,.08);
    }
    .qr-only-box{
      width:260px;
      height:260px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
    }
    .qr-only-box > div{
      background:#fff !important;
      padding:0 !important;
      box-shadow:none !important;
      border-radius:0 !important;
    }
    .qr-only-meta{
      margin-top:14px;
      text-align:center;
      color:#5a6b66;
      font-size:14px;
      display:none;
    }
    @media print {
      body{background:#fff !important}
      .no-print,.navbar,.topbar,.hero,.nav{display:none !important}
      .content-shell,.page-shell,.page-card,#pageContent{padding:0 !important;margin:0 !important;background:transparent !important;box-shadow:none !important}
      .qr-print-stage{display:block}
      .qr-only-shell{display:block}
      .qr-only-card{
        width:auto;
        min-width:0;
        min-height:0;
        box-shadow:none;
        border:none;
        padding:0;
        border-radius:0;
        background:#fff;
      }
      .qr-only-box{width:auto;height:auto}
      @page{size:auto;margin:10mm}
    }
  </style>
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { getCardById, getCardByCode, ensureQrCodeLib, escapeHtml } from './app.js';

  const ctx = await mountShell('print-card-template.html','Print QR','แสดง QR Code สำหรับพิมพ์อย่างเดียว');
  if (!ctx) throw new Error('auth required');

  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div id="printToolbar" class="card no-print qr-print-toolbar">
      <div class="btn-row">
        <button class="btn primary" id="printBtn" type="button">Print QR / Save PDF</button>
        <a class="btn secondary" id="detailBtn" href="search-card.html">Back to Search</a>
      </div>
      <div id="printFeedback" class="helper" style="margin-top:8px">Loading QR...</div>
    </div>
    <div id="printStage" class="qr-print-stage"></div>`;

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const code = params.get('code');
  const printStageEl = document.getElementById('printStage');
  const printFeedbackEl = document.getElementById('printFeedback');
  const detailBtnEl = document.getElementById('detailBtn');

  async function render() {
    try {
      const card = id ? await getCardById(id) : await getCardByCode(code || '');
      if (!card) throw new Error('Card not found.');
      detailBtnEl.href = `card-detail.html?id=${encodeURIComponent(card.id)}`;
      await ensureQrCodeLib();
      printStageEl.innerHTML = `
        <div class="qr-only-shell">
          <div>
            <div class="qr-only-card">
              <div id="qrOnly" class="qr-only-box"></div>
            </div>
            <div class="qr-only-meta">${escapeHtml(card.card_code || '-')}</div>
          </div>
        </div>`;
      new window.QRCode(document.getElementById('qrOnly'), {
        text: card.card_code || '',
        width: 260,
        height: 260,
        correctLevel: window.QRCode.CorrectLevel.H
      });
      printFeedbackEl.textContent = `Ready to print QR for ${card.card_code}.`;
    } catch (err) {
      printStageEl.innerHTML = `<div class="card"><h3>Print QR load failed</h3><div class="helper">${escapeHtml(err.message || 'Unknown error')}</div></div>`;
      printFeedbackEl.textContent = 'Load failed';
    }
  }

  document.getElementById('printBtn').addEventListener('click', () => window.print());
  await render();
</script>
</body>
</html>
