<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Card Template</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell } from './auth-guard.js';
  import { getCardById, getCardByCode, ensureQrCodeLib, escapeHtml, formatMoney, toDateValue } from './app.js';
  const ctx = await mountShell('print-card-template.html','Print Card Template','พรีวิวการ์ดจริง front/back และพร้อมพิมพ์หรือ Save as PDF');
  if (!ctx) throw new Error('auth required');
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div id="printToolbar" class="card no-print"><div class="btn-row"><button class="btn primary" id="printBtn" type="button">Print / Save PDF</button><a class="btn secondary" id="detailBtn" href="search-card.html">Back to Search</a></div><div id="printFeedback" class="helper" style="margin-top:8px">Loading card...</div></div><div id="printStage"></div>`;

  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const code = params.get('code');
  const printStageEl = document.getElementById('printStage');
  const printFeedbackEl = document.getElementById('printFeedback');
  const detailBtnEl = document.getElementById('detailBtn');

  async function render() {
    try {
      const card = id ? await getCardById(id) : await getCardByCode(code || '');
      if (!card) throw new Error('Card not found.');
      detailBtnEl.href = `card-detail.html?id=${encodeURIComponent(card.id)}`;
      await ensureQrCodeLib();
      printStageEl.innerHTML = `
        <div class="print-card-stage">
          <div class="sale-card-mockup sale-card-mockup-clean">
            <div class="sale-card-front sale-card-front-clean">
              <div class="sale-card-border"></div>
              <div class="sale-card-front-top">
                <div>
                  <div class="sale-card-brand">LAYA RESORT HOTEL</div>
                  <div class="sale-card-subtitle">Sales Voucher</div>
                </div>
                <div class="sale-card-value-block">
                  <div class="sale-card-currency">${escapeHtml((card.currency || 'THB'))}</div>
                  <div class="sale-card-value">${escapeHtml(String(card.face_value || 0))}</div>
                </div>
              </div>
              <div class="sale-card-front-main">
                <div class="sale-card-qr-wrap sale-card-qr-wrap-clean"><div id="qrFront" class="sale-card-qr"></div></div>
                <div class="sale-card-front-meta sale-card-front-meta-clean">
                  <div class="sale-card-code-label">Card Code</div>
                  <div class="sale-card-code-big">${escapeHtml(card.card_code || '-')}</div>
                  <div class="sale-card-chip-grid">
                    <div class="sale-card-chip"><span>Outlet</span><strong>${escapeHtml(card.outlet_scope || 'Aroonsawat')}</strong></div>
                    <div class="sale-card-chip"><span>Valid Until</span><strong>${escapeHtml(toDateValue(card.valid_until) || 'Until fully redeemed')}</strong></div>
                  </div>
                </div>
              </div>
              <div class="sale-card-footer sale-card-footer-clean">Present this card before ordering</div>
            </div>
            <div class="sale-card-back sale-card-back-clean">
              <div class="sale-card-border"></div>
              <div class="sale-card-back-header">
                <div class="sale-card-back-title">Voucher Policy</div>
                <div class="sale-card-back-sub">Issued by LAYA RESORT HOTEL</div>
              </div>
              <div class="sale-card-policy-grid">
                <div class="sale-card-policy-box">
                  <span>Valid Until</span>
                  <strong>${escapeHtml(toDateValue(card.valid_until) || 'Until fully redeemed')}</strong>
                </div>
                <div class="sale-card-policy-box">
                  <span>Outlet</span>
                  <strong>${escapeHtml(card.outlet_scope || 'Aroonsawat')}</strong>
                </div>
              </div>
              <div class="sale-card-terms-title">Terms &amp; Conditions</div>
              <ul class="sale-card-terms sale-card-terms-clean">
                <li>Present this card before ordering.</li>
                <li>Redeemable only at ${escapeHtml(card.outlet_scope || 'Aroonsawat')}.</li>
                <li>Non-refundable and has no cash value.</li>
              </ul>
              <div class="sale-card-back-footer">
                <div class="sale-card-note-small">Management may amend terms without prior notice.</div>
                <div class="sale-card-serial">Serial: ${escapeHtml(card.card_serial || card.card_code || '-')}</div>
              </div>
            </div>
          </div>
        </div>`;
      new window.QRCode(document.getElementById('qrFront'), {
        text: card.card_code || '',
        width: 148,
        height: 148,
        correctLevel: window.QRCode.CorrectLevel.H
      });
      printFeedbackEl.textContent = `Ready to print ${card.card_code}.`;
    } catch (err) {
      printStageEl.innerHTML = `<div class="card"><h3>Print template load failed</h3><div class="helper">${escapeHtml(err.message || 'Unknown error')}</div></div>`;
      printFeedbackEl.textContent = 'Load failed';
    }
  }

  document.getElementById('printBtn').addEventListener('click', () => window.print());
  await render();
</script>
</body>
</html>
