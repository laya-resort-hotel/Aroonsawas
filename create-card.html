<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Create Card</title><link rel="stylesheet" href="style.css" /></head>
<body><div id="app"></div>
<script type="module">
  import { mountShell, roleCan } from './auth-guard.js';
  import { getSettings, createCard, listCards, formatMoney, escapeHtml, parseCardCode, ensureQrCodeLib } from './app.js';
  const ctx = await mountShell('create-card.html','Create Card','สร้างบัตรใหม่ลง Firebase ในสถานะ draft พร้อม QR preview ทันที และ Save แล้วเปิดหน้า Print ให้อัตโนมัติ');
  if (!ctx || !roleCan(ctx.profile.role, 'create')) location.href = 'index.html';
  const settings = await getSettings();
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div class="split"><div class="card"><form id="cardForm" class="form-grid">
    <div class="field half"><label>Card Code</label><input id="card_code" required placeholder="เช่น SV600-004"></div>
    <div class="field half"><label>Card Label</label><input id="card_label" required placeholder="เช่น Sales Voucher 004"></div>
    <div class="field half"><label>Card Serial</label><input id="card_serial" placeholder="เช่น AR-SV-2026-0004"></div>
    <div class="field quarter"><label>Face Value</label><input id="face_value" type="number" min="1" value="600" required></div>
    <div class="field quarter"><label>Sold Price</label><input id="sold_price" type="number" min="1" value="490" required></div>
    <div class="field half"><label>Outlet Scope</label><select id="outlet_scope">${(settings.outlets||[]).map(o=>`<option>${escapeHtml(o)}</option>`).join('')}</select></div>
    <div class="field half"><label>Valid Until</label><input id="valid_until" type="date"></div>
    <div class="field"><label>Notes</label><textarea id="notes" placeholder="Internal note"></textarea></div>
    <div class="field"><div class="btn-row"><button class="btn primary" type="submit">Save Draft</button><button class="btn secondary" type="button" id="fillBtn">Generate Sample Code</button><button class="btn secondary" type="button" id="previewBtn">Refresh Preview</button></div></div>
    <div class="field"><div id="feedback" class="helper"></div></div>
  </form></div>
  <div class="card">
    <h3>QR Preview</h3>
    <div class="qr-preview-layout">
      <div class="qr-preview-visual">
        <div id="qrPreview" class="qr-live-code"></div>
        <div class="small-note">QR จะ encode เฉพาะ Card Code เพื่อให้ดึงข้อมูลจริงจาก Firebase</div>
      </div>
      <div id="previewBox" class="list-item"></div>
    </div>
  </div></div>`;

  const form = document.getElementById('cardForm');
  const feedback = document.getElementById('feedback');
  const cardCode = document.getElementById('card_code');
  const cardLabel = document.getElementById('card_label');
  const cardSerial = document.getElementById('card_serial');
  const faceValue = document.getElementById('face_value');
  const soldPrice = document.getElementById('sold_price');
  const outletScope = document.getElementById('outlet_scope');
  const validUntil = document.getElementById('valid_until');
  const notesEl = document.getElementById('notes');
  const previewBox = document.getElementById('previewBox');
  const qrPreview = document.getElementById('qrPreview');
  let qrReady = false;
  let previewRun = 0;

  async function renderPreview() {
    const runId = ++previewRun;
    const code = parseCardCode(cardCode.value);
    previewBox.innerHTML = `<div class="stat-line"><span>Card Code</span><strong>${escapeHtml(code || '-')}</strong></div>
    <div class="stat-line"><span>Card Label</span><strong>${escapeHtml(cardLabel.value || '-')}</strong></div>
    <div class="stat-line"><span>Card Serial</span><strong>${escapeHtml(cardSerial.value || '-')}</strong></div>
    <div class="stat-line"><span>Face Value</span><strong>${formatMoney(faceValue.value || 0)}</strong></div>
    <div class="stat-line"><span>Sold Price</span><strong>${formatMoney(soldPrice.value || 0)}</strong></div>
    <div class="stat-line"><span>Outlet</span><strong>${escapeHtml(outletScope.value || '-')}</strong></div>
    <div class="stat-line"><span>Valid Until</span><strong>${escapeHtml(validUntil.value || 'Until fully redeemed')}</strong></div>`;

    qrPreview.innerHTML = '';
    if (!code) {
      qrPreview.innerHTML = `<div class="qr-empty">กรอก Card Code เพื่อสร้าง QR Preview</div>`;
      return;
    }
    try {
      if (!qrReady) {
        await ensureQrCodeLib();
        qrReady = true;
      }
      if (runId !== previewRun) return;
      new window.QRCode(qrPreview, {
        text: code,
        width: 170,
        height: 170,
        correctLevel: window.QRCode.CorrectLevel.H
      });
    } catch (err) {
      qrPreview.innerHTML = `<div class="qr-empty">โหลด QR preview ไม่สำเร็จ</div>`;
    }
  }

  document.getElementById('fillBtn').onclick = async () => {
    const cards = await listCards({});
    const n = String(cards.length + 1).padStart(3, '0');
    cardCode.value = `SV600-${n}`;
    cardLabel.value = `Sales Voucher ${n}`;
    cardSerial.value = `AR-SV-2026-${n}`;
    await renderPreview();
  };
  document.getElementById('previewBtn').onclick = renderPreview;
  [cardCode, cardLabel, cardSerial, faceValue, soldPrice, outletScope, validUntil].forEach(elm => elm.addEventListener('input', renderPreview));
  await renderPreview();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let printTab = null;
    try {
      printTab = window.open('about:blank', '_blank', 'noopener,noreferrer');
    } catch {}
    feedback.textContent = 'Saving draft to Firebase...';
    try {
      const card = await createCard({ card_code: cardCode.value, card_label: cardLabel.value, card_serial: cardSerial.value, face_value: faceValue.value, sold_price: soldPrice.value, outlet_scope: outletScope.value, valid_until: validUntil.value, notes: notesEl.value }, ctx);
      const printUrl = `print-card-template.html?id=${encodeURIComponent(card.id)}`;
      feedback.innerHTML = `Saved draft <strong>${escapeHtml(card.card_code)}</strong> successfully. กำลังเปิดหน้า Print... <a href="card-detail.html?id=${encodeURIComponent(card.id)}">Open detail</a> · <a href="${printUrl}" target="_blank" rel="noopener noreferrer">Open print manually</a>`;
      if (printTab) {
        printTab.location.href = printUrl;
      } else {
        window.open(printUrl, '_blank', 'noopener,noreferrer');
      }
      form.reset();
      feedback.insertAdjacentHTML('beforeend', ` <span class="small-note">Preview ถูก reset แล้ว พร้อมสร้างใบถัดไป</span>`);
      await renderPreview();
    } catch (err) {
      if (printTab && !printTab.closed) printTab.close();
      feedback.textContent = err.message || 'Save failed';
    }
  });
</script>
</body></html>
