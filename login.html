<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Redirect</title>
  <meta http-equiv="refresh" content="0; url=index.html?login=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-header">
      <h1>Redirecting…</h1>
      <p>กำลังพากลับไปหน้า Login หลักของ Sales Voucher</p>
    </div>
    <div class="notice">หากระบบไม่พาไปอัตโนมัติ กรุณา <a href="index.html?login=1">กดที่นี่</a></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const next = params.get('next');
    const target = next ? `index.html?login=1&next=${encodeURIComponent(next)}` : 'index.html?login=1';
    location.replace(target);
  </script>
</body>
</html>
