<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Card</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .pkg-stack { display:flex; flex-direction:column; gap:6px; }
    .pkg-stack .badge { width:max-content; }
    .code-sub { margin-top:4px; }
    .batch-chip { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body><div id="app"></div>
<script type="module">
  import { mountShell, roleCan } from './auth-guard.js';
  import { listCards, updateCardStatus, formatMoney, escapeHtml, getStatusClass, toDateValue, inferVoucherPackage, getCardBatchInfo } from './app.js';
  const ctx = await mountShell('search-card.html','Search Card','ค้นหาบัตรตาม code, label และ status โดย FB Staff ดูได้แบบอ่านอย่างเดียว');
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div class="card"><div class="form-grid"><div class="field half"><label>Search</label><input id="query" placeholder="Code, label, serial"></div><div class="field third"><label>Status</label><select id="statusFilter"><option value="">All</option><option>draft</option><option>active</option><option>empty</option><option>disabled</option><option>expired</option><option>void</option></select></div><div class="field third"><label>Outlet</label><input id="outletFilter" placeholder="Optional outlet"></div></div><div id="results" class="helper">Loading...</div></div>`;

  const queryEl = document.getElementById('query');
  const statusFilterEl = document.getElementById('statusFilter');
  const outletFilterEl = document.getElementById('outletFilter');
  const resultsEl = document.getElementById('results');
  async function render() {
    try {
      const rows = await listCards({ query: queryEl.value.trim(), status: statusFilterEl.value, outlet: outletFilterEl.value.trim() });
      resultsEl.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Card</th><th>Package</th><th>Batch</th><th>Status</th><th>Voucher Value</th><th>Remaining</th><th>Outlet</th><th>Valid Until</th><th>Action</th></tr></thead><tbody>${rows.length ? rows.map(c => {
        const pkg = inferVoucherPackage(c);
        const batch = getCardBatchInfo(c);
        return `<tr>
          <td>
            <a href="card-detail.html?id=${c.id}">${escapeHtml(c.card_label || '-')}</a>
            <div class="helper code-sub">${escapeHtml(c.card_code || '-')}</div>
          </td>
          <td>
            <div class="pkg-stack">
              <span class="badge success">${escapeHtml(pkg.shortLabel)}</span>
              <div class="helper">${escapeHtml(pkg.fullLabel)}</div>
            </div>
          </td>
          <td>
            <div class="pkg-stack">
              <span class="badge batch-chip">${escapeHtml(batch?.batchKey || '-')}</span>
              <div class="helper">Run ${escapeHtml(batch?.runningNo ? String(batch.runningNo).padStart(4,'0') : '-')}</div>
            </div>
          </td>
          <td><span class="${getStatusClass(c.status)}">${c.status}</span></td>
          <td>
            <div class="pkg-stack">
              <strong>${formatMoney(pkg.voucherValue)}</strong>
              <div class="helper">Buy ${formatMoney(pkg.purchaseAmount)}</div>
            </div>
          </td>
          <td>${formatMoney(c.remaining_balance)}</td>
          <td>${escapeHtml(c.outlet_scope || '-')}</td>
          <td>${escapeHtml(toDateValue(c.valid_until) || '-')}</td>
          <td><div class="btn-row"><a class="btn secondary" href="card-detail.html?id=${c.id}">Detail</a>${roleCan(ctx.profile.role, 'print') ? `<a class="btn secondary" href="print-card-template.html?id=${c.id}" target="_blank" rel="noopener noreferrer">Print</a>` : ''}${roleCan(ctx.profile.role, 'print') && batch?.batchKey ? `<a class="btn secondary" href="print-batch-9up.html?id=${c.id}" target="_blank" rel="noopener noreferrer">Print 9 / A4</a>` : ''}${roleCan(ctx.profile.role, 'sell') && c.status !== 'disabled' ? `<button class="btn danger actionBtn" data-action="disable" data-id="${c.id}">Disable</button>` : ''}${roleCan(ctx.profile.role, 'sell') && c.status === 'disabled' ? `<button class="btn primary actionBtn" data-action="enable" data-id="${c.id}">Enable</button>` : ''}</div></td>
        </tr>`;
      }).join('') : '<tr><td colspan="9">No cards found.</td></tr>'}</tbody></table></div>`;
      document.querySelectorAll('.actionBtn').forEach(btn => btn.addEventListener('click', async () => {
        try {
          await updateCardStatus(btn.dataset.id, btn.dataset.action === 'disable' ? 'disabled' : 'active', ctx);
          await render();
        } catch (err) {
          alert(err.message || 'Action failed');
        }
      }));
    } catch (err) {
      resultsEl.innerHTML = `<div class="helper">${escapeHtml(err.message || 'Load failed')}</div>`;
    }
  }
  queryEl.oninput = render; statusFilterEl.onchange = render; outletFilterEl.oninput = render; await render();
</script>
</body></html>
