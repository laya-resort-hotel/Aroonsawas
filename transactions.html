<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Transactions</title><link rel="stylesheet" href="style.css" /></head>
<body><div id="app"></div>
<script type="module">
  import { mountShell, roleCan } from './auth-guard.js';
  import { listTransactions, formatMoney, escapeHtml, toDateTimeText } from './app.js';
  const ctx = await mountShell('transactions.html','Transactions','ตรวจสอบรายการ sale / debit / adjustment ของระบบ Sales Voucher v6');
  if (!ctx || !roleCan(ctx.profile.role, 'transactions')) location.href = 'index.html';
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div class="card"><div class="form-grid"><div class="field half"><label>Search</label><input id="query" placeholder="Card code, staff, outlet, note"></div><div class="field half"><label>Transaction Type</label><select id="typeFilter"><option value="">All</option><option>sale</option><option>debit</option><option>refund</option><option>adjustment_plus</option><option>adjustment_minus</option><option>void_sale</option><option>void_debit</option></select></div></div><div id="txBox" class="helper">Loading...</div></div>`;
  const queryEl = document.getElementById('query');
  const typeFilterEl = document.getElementById('typeFilter');
  const txBoxEl = document.getElementById('txBox');
  async function render() {
    const rows = await listTransactions({ query: queryEl.value.trim(), type: typeFilterEl.value });
    txBoxEl.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Date</th><th>Type</th><th>Card</th><th>Amount</th><th>Before</th><th>After</th><th>Outlet</th><th>Staff</th><th>Note</th></tr></thead><tbody>${rows.length ? rows.map(t => `<tr><td>${toDateTimeText(t.created_at)}</td><td>${escapeHtml(t.txn_type)}</td><td>${escapeHtml(t.card_code)}</td><td>${formatMoney(t.amount)}</td><td>${formatMoney(t.balance_before)}</td><td>${formatMoney(t.balance_after)}</td><td>${escapeHtml(t.outlet || '-')}</td><td>${escapeHtml(t.staff_name || '-')}</td><td>${escapeHtml(t.note || '-')}</td></tr>`).join('') : '<tr><td colspan="9">No transactions found.</td></tr>'}</tbody></table></div>`;
  }
  queryEl.oninput = render; typeFilterEl.onchange = render; await render();
</script>
</body></html>
